<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="stylesheet" href="css/style.css">
  <title>Social links profile</title>
</head>

<body>
  <main class="main">
    <article class="profile-card">
      <img src="images/avatar-jessica.jpeg" alt="Jessica Randall" class="profile-card__avatar">
      <h1 class="profile-card__name">Jessica Randall</h1>
      <p class="profile-card__location">London, United Kingdom</p>
      <p class="profile-card__description">"Front-end developer and avid reader."</p>
      <nav class="profile-card__social" aria-label="Social links">
        <ul class="profile-card__links">
          <li class="profile-card__item">
            <a href="#" class="profile-card__link">GitHub</a>
          </li>
          <li class="profile-card__item">
            <a href="#" class="profile-card__link">Frontend Mentor</a>
          </li>
          <li class="profile-card__item">
            <a href="#" class="profile-card__link">LinkedIn</a>
          </li>
          <li class="profile-card__item">
            <a href="#" class="profile-card__link">Twitter</a>
          </li>
          <li class="profile-card__item">
            <a href="#" class="profile-card__link">Instagram</a>
          </li>
        </ul>
      </nav>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" class="attribution-link">Frontend Mentor</a>.
    Coded by <a href="https://github.com/shigureyn" class="attribution-link">Shigureyn</a>.
  </footer>
</body>

</html>
